<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <title>通報一覧</title>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>
</head>

<body>
<div class="samuraichat-wrapper">
    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 samuraichat-container">

            <h1 class="mb-4 text-center">通報一覧</h1>

            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>通報者</th>
                    <th>対象ユーザー</th>
                    <th>理由</th>
                    <th>日時</th>
                    <th>ステータス</th>
                    <th>操作</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="r : ${reports}">
                    <td th:text="${r.id}"></td>

                    <td th:text="${r.reporter.name}"></td>

                    <td th:text="${r.targetUser.name}"></td>

                    <td th:text="${r.reason}"></td>

                    <td th:text="${#dates.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></td>

                    <td th:text="${r.status}"></td>

                    <td>
                        <a th:href="@{'/admin/reports/' + ${r.id} + '/resolve'}"
                           class="btn btn-success btn-sm">対応済みにする</a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </main>

    <div th:replace="~{fragment :: footer}"></div>
</div>

<div th:replace="~{fragment :: scripts}"></div>
</body>
</html>
