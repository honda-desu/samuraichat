<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>
    <title>新規予定の作成 | SAMURAI Chat</title>
</head>

<body>
<div class="samuraichat-wrapper">

    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container-fluid pt-4 pb-5 samuraichat-container">

            <h2 class="mb-4">新規予定の作成</h2>

            <form th:action="@{/calendar/event/new}" method="post">

                <div class="mb-3">
                    <label>タイトル</label>
                    <input type="text" name="summary" class="form-control">
                </div>

                <div class="mb-3">
                    <label>説明</label>
                    <textarea name="description" class="form-control"></textarea>
                </div>

                <div class="mb-3">
                    <label>開始日時</label>
                    <input type="datetime-local" name="start" class="form-control">
                </div>

                <div class="mb-3">
                    <label>終了日時</label>
                    <input type="datetime-local" name="end" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">作成する</button>
                <a href="/calendar" class="btn btn-secondary">戻る</a>

            </form>

        </div>
    </main>

    <div th:replace="~{fragment :: footer}"></div>
</div>

<div th:replace="~{fragment :: scripts}"></div>
</body>
</html>
