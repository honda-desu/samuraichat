<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>
    <title>マイページ | SAMURAI Chat</title>
</head>

<body>
<div class="samuraichat-wrapper">
    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 samuraichat-container">

            <h1 class="text-center mb-4">マイページ</h1>

            <div class="row justify-content-center">
                <div class="col-md-8">

                    <!-- プロフィールカード -->
                    <div class="card shadow-sm p-4">

                        <!-- プロフィール画像 -->
                        <div class="text-center mb-4">

                            <!-- 画像あり -->
                            <img th:if="${user.profileImage != null}"
                                 th:src="@{'/uploads/' + ${user.profileImage}}"
                                 alt="プロフィール画像"
                                 class="rounded-circle"
                                 style="width:150px; height:150px; object-fit:cover;">

                            <!-- 画像なし → noimage.png -->
                            <img th:if="${user.profileImage == null}"
                                 th:src="@{/images/noimage.png}"
                                 alt="プロフィール画像"
                                 class="rounded-circle"
                                 style="width:150px; height:150px; object-fit:cover;">
                        </div>

                        <!-- プロフィール情報 -->
                        <table class="table">
                            <tr>
                                <th style="width:30%">名前</th>
                                <td th:text="${user.name}"></td>
                            </tr>
                            <tr>
                                <th>ふりがな</th>
                                <td th:text="${user.furigana}"></td>
                            </tr>
                            <tr>
                                <th>メール</th>
                                <td th:text="${user.email}"></td>
                            </tr>
                            <tr>
                                <th>プロフィール文</th>
                                <td th:text="${user.profileText} ?: 'まだプロフィールが設定されていません'"></td>
                            </tr>
                        </table>

                        <!-- 編集ボタン -->
                        <div class="text-center mt-4">
                            <a th:href="@{/mypage/edit}" class="btn btn-primary btn-lg">
                                プロフィールを編集する
                            </a>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </main>

    <div th:replace="~{fragment :: footer}"></div>
</div>

<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
